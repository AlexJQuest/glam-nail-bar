name: GitHub Pages Deploy

on:
  push:
    branches:
      - test
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      - name: Determine deploy branch
        id: deploy-target
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "target_branch=gh-pages" >> "$GITHUB_OUTPUT"
            echo "commit_message=Deploy production from main" >> "$GITHUB_OUTPUT"
          else
            echo "target_branch=gh-pages-test" >> "$GITHUB_OUTPUT"
            echo "commit_message=Deploy staging from test" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: ${{ steps.deploy-target.outputs.target_branch }}
          publish_dir: ./dist
          user_name: GitHub Actions
          user_email: actions@github.com
          commit_message: ${{ steps.deploy-target.outputs.commit_message }}
