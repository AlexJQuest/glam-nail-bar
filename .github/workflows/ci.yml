name: CI Pipeline

on:
  push:
    branches:
      - dev
      - test
      - main
  pull_request:
    branches:
      - dev
      - test
      - main

jobs:
  build:
    name: Build on ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run production build
        run: npm run build

      - name: Confirm branch pipeline
        run: |
          echo "Branch: ${{ github.ref_name }}"
          if [ "${{ github.ref_name }}" = "dev" ]; then
            echo "Running dev pipeline checks";
          elif [ "${{ github.ref_name }}" = "test" ]; then
            echo "Running test pipeline checks";
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "Running main pipeline checks";
          fi
